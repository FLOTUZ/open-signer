services:
  init-certs:
    image: node:20-alpine
    container_name: opensigner_init_certs
    env_file:
      - .env
    volumes:
      - ./scripts:/app/scripts:ro
      - ${SAT_CERTS_HOST_DIR:-./certs/sat}:/app/certs/sat
      - ${SAT_CERTS_TEST_HOST_DIR:-./certs/sat-test}:/app/certs/sat-test
      - ./certs:/app/certs_hash
    environment:
      - SAT_CERTS_HOST_DIR=/app/certs/sat
      - SAT_CERTS_TEST_HOST_DIR=/app/certs/sat-test
      - SAT_CERTS_HASH_FILE=/app/certs_hash/sat-certs.sha256
      - SAT_CERTS_TEST_HASH_FILE=/app/certs_hash/sat-certs-test.sha256
    command: >
      sh -c "apk add --no-cache bash curl unzip coreutils && bash /app/scripts/install-sat-certs.sh -y"

  backend:
    build: .
    container_name: opensigner_backend
    depends_on:
      init-certs:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Le indicamos a Node.js dónde buscar los certificados inyectados
      - SAT_CERTS_DIR=/app/certs/sat
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      # Uploads: Lectura y escritura (riesgo controlado por la aplicación)
      - ./uploads:/app/uploads
      # Certificados: SOLO LECTURA (:ro). El contenedor no puede borrarlos ni alterarlos.
      - ${SAT_CERTS_HOST_DIR:-./certs/sat}:/app/certs/sat:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Límite de recursos para evitar ataques de denegación de servicio (DDoS) que tiren el host
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://${DOMAIN:-localhost}:${PORT:-5000}/api/v1
    container_name: opensigner_frontend
    ports:
      - "5001:80"
    depends_on:
      - backend