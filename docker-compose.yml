services:
  backend:
    build: .
    container_name: opensigner_backend
    env_file:
      - .env
    environment:
      # Le indicamos a Node.js dónde buscar los certificados inyectados
      - SAT_CERTS_DIR=/app/certs/sat
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      # Uploads: Lectura y escritura (riesgo controlado por la aplicación)
      - ./uploads:/app/uploads
      # Certificados: SOLO LECTURA (:ro). El contenedor no puede borrarlos ni alterarlos.
      - ${SAT_CERTS_HOST_DIR:-./certs/sat}:/app/certs/sat:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Límite de recursos para evitar ataques de denegación de servicio (DDoS) que tiren el host
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api/v1}
    container_name: opensigner_frontend
    ports:
      - "5001:80"
    depends_on:
      - backend